<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>과제</title></head>
<body>
    <h2>성적 관리 시스템</h2>
    <hr>
    <div>
        <b>1. 학생 등록</b><br>
        학번: <input type="text" id="sid"> 
        이름: <input type="text" id="sname">
        <button onclick="addStu()">등록</button>
    </div><br>

    <div>
        <b>2. 성적 입력</b><br>
        학번: <input type="text" id="ssid"> 
        과목: <input type="text" id="sub"> 
        점수: <input type="number" id="pt">
        <button onclick="addScore()">입력</button>
    </div><br>

    <div>
        <b>3. 결과 조회</b> <button onclick="getList()">새로고침</button><br><br>
        <table border="1">
            <thead>
                <tr><th>학번</th><th>이름</th><th>과목</th><th>점수</th><th>등급</th></tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        function addStu() {
            var id = document.getElementById('sid').value;
            var name = document.getElementById('sname').value;
            fetch('/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: id, name: name })
            }).then(res => res.json()).then(data => { alert('완료'); });
        }

        function addScore() {
            var id = document.getElementById('ssid').value;
            var sub = document.getElementById('sub').value;
            var pt = document.getElementById('pt').value;
            fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: id, subject: sub, point: Number(pt) })
            }).then(res => res.json()).then(data => { alert('완료'); getList(); });
        }

        function getList() {
            fetch('/api/results')
            .then(res => res.json())
            .then(data => {
                var box = document.getElementById('list');
                box.innerHTML = '';
                for(var i=0; i<data.length; i++) {
                    box.innerHTML += '<tr><td>'+data[i].student_id+'</td><td>'+data[i].name+'</td><td>'+data[i].subject+'</td><td>'+data[i].point+'</td><td>'+data[i].grade+'</td></tr>';
                }
            });
        }
    </script>
</body>
</html>
